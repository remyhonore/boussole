# .github/workflows/boussole_ci.yml
name: Boussole — CI (syntax + smoke)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: boussole-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          V="$(tr -d ' \t\r\n' < VERSION.txt)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::VERSION.txt invalide: '$V'"; exit 1; }
          echo "Repo version: $V"

      - name: JS syntax check (node --check)
        shell: bash
        run: |
          set -euo pipefail
          node --version
          for f in app/app.js app/dashboard.js app/sw.js; do
            [[ -f "$f" ]] || { echo "::error::Missing $f"; exit 1; }
            echo "Checking syntax: $f"
            node --check "$f"
          done

      - name: Version wiring checks (VERSION.txt ↔ ?v=VERSION)
        shell: bash
        env:
          V: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail

          must_grep () { local pat="$1" file="$2"; grep -qF "$pat" "$file" || { echo "::error::Missing '$pat' in $file"; exit 1; }; }

          # 1) Les pages doivent pointer vers les bons assets en ?v=VERSION (cache-busting)
          must_grep "app.js?v=$V" "app/index.html"
          must_grep "dashboard.js?v=$V" "app/dashboard.html"

          # 2) Service worker doit être enregistré en ?v=VERSION (évite shell mixte après pull/deploy)
          if ! grep -qF "sw.js?v=" app/app.js; then
            echo "::error::Service worker register() doit inclure ./sw.js?v=... (introuvable)."
            exit 1
          fi

          # 3) app/app.js doit exposer APP_VERSION cohérent avec VERSION.txt (source de vérité)
          if ! grep -qE "const[[:space:]]+APP_VERSION[[:space:]]*=[[:space:]]*['\"]${V}['\"];?" app/app.js; then
            echo "::error::app/app.js doit contenir: const APP_VERSION = '${V}';"
            exit 1
          fi

          # 4) Pas d’autres valeurs ?v= ailleurs (anti “mix de fichiers”)
          files=(index.html en.html boussole_suivi_projet.html app/index.html app/dashboard.html app/dashboard.js)
          for f in "${files[@]}"; do
            [[ -f "$f" ]] || continue
            vals="$(grep -oE '\?v=[0-9]+\.[0-9]+\.[0-9]+' "$f" | sed 's/?v=//' | sort -u | tr '\n' ' ' | xargs || true)"
            if [[ -n "${vals:-}" && "$vals" != "$V" ]]; then
              echo "::error::$f contient des ?v= incohérents. Attendu: $V. Trouvé: $vals"
              exit 1
            fi
          done

      - name: Local smoke (http.server + curl)
        shell: bash
        env:
          V: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail

          PORT=8080
          python3 -m http.server "$PORT" --bind 127.0.0.1 >/tmp/http.log 2>&1 &
          PID=$!
          cleanup(){ kill "$PID" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          # Attendre que le serveur réponde
          for i in {1..40}; do
            if curl -fsS "http://127.0.0.1:${PORT}/VERSION.txt" >/dev/null 2>&1; then break; fi
            sleep 0.1
          done

          localV="$(curl -fsS "http://127.0.0.1:${PORT}/VERSION.txt" | tr -d ' \t\r\n')"
          [[ "$localV" == "$V" ]] || { echo "::error::Local VERSION.txt mismatch. got='$localV' expected='$V'"; exit 1; }

          curl -fsS "http://127.0.0.1:${PORT}/" >/dev/null
          curl -fsS "http://127.0.0.1:${PORT}/app/" | grep -F "v$V" >/dev/null
          curl -fsS "http://127.0.0.1:${PORT}/app/app.js?v=$V" >/dev/null
          curl -fsS "http://127.0.0.1:${PORT}/app/dashboard.html" >/dev/null
          curl -fsS "http://127.0.0.1:${PORT}/app/dashboard.js?v=$V" >/dev/null
          curl -fsS "http://127.0.0.1:${PORT}/app/sw.js?v=$V" >/dev/null

          echo "OK: local smoke passed ✅"
