name: Boussole — CI (syntax + smoke)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read VERSION.txt
        id: ver
        run: |
          set -euo pipefail
          V="$(tr -d '\r\n' < VERSION.txt)"
          if [ -z "$V" ]; then
            echo "VERSION.txt is empty"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "Repo version: $V"

      - name: JS syntax check
        run: |
          set -euo pipefail
          node --version
          node --check app/app.js
          node --check app/dashboard.js
          node --check app/sw.js

      - name: Version wiring (HTML must reference VERSION)
        run: |
          set -euo pipefail
          V="$VERSION"

          # app/index.html must display version and reference JS with ?v=
          grep -q "v${V}" app/index.html
          grep -q "app.js?v=${V}" app/index.html
          grep -q "dashboard.js?v=${V}" app/index.html
          grep -q "sw.js?v=${V}" app/index.html

          # root index should exist (site entrypoint)
          test -f index.html
          grep -q "VERSION.txt" index.html || true

      - name: Local serve + curl smoke
        run: |
          set -euo pipefail
          V="$VERSION"
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          PID=$!
          sleep 1

          TS="$(date +%s)"

          curl -fsS "http://127.0.0.1:8000/VERSION.txt?nocache=$TS" | tr -d '\r\n' | grep -qx "$V"
          curl -fsS "http://127.0.0.1:8000/app/?nocache=$TS" | grep -q "Boussole"
          curl -fsS "http://127.0.0.1:8000/app/app.js?v=$V" >/dev/null
          curl -fsS "http://127.0.0.1:8000/app/dashboard.js?v=$V" >/dev/null
          curl -fsS "http://127.0.0.1:8000/app/sw.js?v=$V" >/dev/null

          kill $PID
