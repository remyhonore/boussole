name: Boussole — CI (syntax + smoke)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify repo (JS syntax + smoke checks)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JS syntax check (node --check)
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node --version)"
          mapfile -t FILES < <(git ls-files '*.js')
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No JS files found in repo." >&2
            exit 1
          fi

          echo "Checking syntax for ${#FILES[@]} JS files…"
          for f in "${FILES[@]}"; do
            echo "→ node --check ${f}"
            node --check "${f}"
          done

      - name: Version consistency (VERSION.txt / app header / JS constants)
        shell: bash
        run: |
          set -euo pipefail

          V="$(tr -d ' \t\r\n' < VERSION.txt)"
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION.txt invalid: '$V'" >&2
            exit 1
          fi
          echo "VERSION.txt = $V"

          H="$(python3 - << 'PY'
import re, pathlib
p = pathlib.Path("app/index.html").read_text(encoding="utf-8", errors="replace")
m = re.search(r'v(\d+\.\d+\.\d+)', p)
print(m.group(1) if m else "")
PY
)"
          if [ -z "$H" ]; then
            echo "Could not find a 'vX.Y.Z' string in app/index.html" >&2
            exit 1
          fi
          echo "app/index.html shows v$H"

          A="$(python3 - << 'PY'
import re, pathlib
p = pathlib.Path("app/app.js").read_text(encoding="utf-8", errors="replace")
m = re.search(r'APP_VERSION\s*=\s*[\'"](\d+\.\d+\.\d+)[\'"]', p)
print(m.group(1) if m else "")
PY
)"
          if [ -z "$A" ]; then
            echo "Could not find APP_VERSION in app/app.js" >&2
            exit 1
          fi
          echo "app/app.js APP_VERSION = $A"

          D="$(python3 - << 'PY'
import re, pathlib
p = pathlib.Path("app/dashboard.js").read_text(encoding="utf-8", errors="replace")
m = re.search(r'DASH_VERSION\s*=\s*[\'"](\d+\.\d+\.\d+)[\'"]', p)
print(m.group(1) if m else "")
PY
)"
          if [ -z "$D" ]; then
            echo "Could not find DASH_VERSION in app/dashboard.js" >&2
            exit 1
          fi
          echo "app/dashboard.js DASH_VERSION = $D"

          if [ "$V" != "$H" ] || [ "$V" != "$A" ] || [ "$V" != "$D" ]; then
            echo "Version mismatch detected:" >&2
            echo "  VERSION.txt           = $V" >&2
            echo "  app/index.html (v...) = $H" >&2
            echo "  app/app.js            = $A" >&2
            echo "  app/dashboard.js      = $D" >&2
            exit 1
          fi

      - name: Smoke test (serve + curl basic endpoints)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --directory . >/tmp/http.log 2>&1 &
          PID=$!

          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:4173/app/" >/dev/null 2>&1; then
              break
            fi
            sleep 0.2
          done

          echo "GET / …"
          curl -fsS "http://127.0.0.1:4173/" >/dev/null

          echo "GET /app/ …"
          curl -fsS "http://127.0.0.1:4173/app/" >/dev/null

          echo "GET /app/app.js …"
          curl -fsS "http://127.0.0.1:4173/app/app.js" >/dev/null

          echo "GET /app/dashboard.js …"
          curl -fsS "http://127.0.0.1:4173/app/dashboard.js" >/dev/null

          echo "GET /app/sw.js …"
          curl -fsS "http://127.0.0.1:4173/app/sw.js" >/dev/null

          echo "GET /VERSION.txt …"
          curl -fsS "http://127.0.0.1:4173/VERSION.txt" >/dev/null

          kill "$PID"
