name: Boussole — Auto Release (READY gate)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run release script
        id: rel
        run: |
          chmod +x scripts/release.sh
          scripts/release.sh
        shell: bash

      - name: Sanity checks (JS syntax + version consistency)
        shell: bash
        run: |
          set -euo pipefail

          echo "Node: $(node --version)"
          mapfile -t FILES < <(git ls-files '*.js')
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No JS files found in repo." >&2
            exit 1
          fi

          echo "Checking syntax for ${#FILES[@]} JS files…"
          for f in "${FILES[@]}"; do
            echo "→ node --check ${f}"
            node --check "${f}"
          done

          V="$(tr -d ' \t\r\n' < VERSION.txt)"
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION.txt invalid: '$V'" >&2
            exit 1
          fi

          H="$(python3 - << 'PY'
import re, pathlib
p = pathlib.Path("app/index.html").read_text(encoding="utf-8", errors="replace")
m = re.search(r'v(\d+\.\d+\.\d+)', p)
print(m.group(1) if m else "")
PY
)"
          A="$(python3 - << 'PY'
import re, pathlib
p = pathlib.Path("app/app.js").read_text(encoding="utf-8", errors="replace")
m = re.search(r'APP_VERSION\s*=\s*[\'"](\d+\.\d+\.\d+)[\'"]', p)
print(m.group(1) if m else "")
PY
)"
          D="$(python3 - << 'PY'
import re, pathlib
p = pathlib.Path("app/dashboard.js").read_text(encoding="utf-8", errors="replace")
m = re.search(r'DASH_VERSION\s*=\s*[\'"](\d+\.\d+\.\d+)[\'"]', p)
print(m.group(1) if m else "")
PY
)"

          if [ -z "$H" ] || [ -z "$A" ] || [ -z "$D" ]; then
            echo "Missing version markers (index.html/app.js/dashboard.js)." >&2
            exit 1
          fi

          if [ "$V" != "$H" ] || [ "$V" != "$A" ] || [ "$V" != "$D" ]; then
            echo "Version mismatch detected:" >&2
            echo "  VERSION.txt           = $V" >&2
            echo "  app/index.html (v...) = $H" >&2
            echo "  app/app.js            = $A" >&2
            echo "  app/dashboard.js      = $D" >&2
            exit 1
          fi

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION.txt)" >> $GITHUB_OUTPUT

      - name: Commit + push release changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${{ steps.ver.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Tag
        run: |
          git tag "v${{ steps.ver.outputs.version }}" || true
          git push origin "v${{ steps.ver.outputs.version }}" || true

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: boussole-v${{ steps.ver.outputs.version }}-full
          path: dist/boussole-v${{ steps.ver.outputs.version }}-full.zip

      - name: Create GitHub Release + attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Boussole v${{ steps.ver.outputs.version }}
          body_path: dist/RELEASE_NOTES.md
          files: dist/boussole-v${{ steps.ver.outputs.version }}-full.zip
